    <meta name="theme-color" content="#0B2A4A" />

    <!-- Static SEO defaults (seen by crawlers/scrapers that don't run JS) -->
    <title>Royal Derby — Horse Racing Management</title>
    <meta name="description" content="Royal Derby — manage races, horses, jockeys, results and betting in one platform." />
    <meta property="og:title" content="Royal Derby" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-default.png" />

    <!-- Font preconnects (must come before stylesheet link for optimal loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts loaded via <link> (faster than CSS @import) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap"
    />
  </head>
