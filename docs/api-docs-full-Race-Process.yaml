components:
  schemas:
    ApiResponseString:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: string
    CompleteTrainerProfileRequest:
      type: object
      properties:
        age:
          type: integer
          format: int32
        experienceYears:
          type: integer
          format: int32
        description:
          type: string
        avatarUrl:
          type: string
    ApiResponseTrainerProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/TrainerProfileResponse"
    TrainerProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        name:
          type: string
        age:
          type: integer
          format: int32
        experienceYears:
          type: integer
          format: int32
        description:
          type: string
        avatarUrl:
          type: string
        status:
          type: string
    ApiResponseRaceResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/RaceResponse"
    RaceResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        raceName:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        trackName:
          type: string
        trackCondition:
          type: string
        surfaceType:
          type: string
        totalprizepool:
          type: integer
          format: int64
        distance:
          type: string
        location:
          type: string
        capacity:
          type: integer
          format: int64
        bannerImageurl:
          type: string
        status:
          type: string
        registrationDeadline:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        refereeId:
          type: integer
          format: int64
        refereeName:
          type: string
    CreateRaceRequest:
      type: object
      properties:
        raceName:
          type: string
          minLength: 1
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        trackName:
          type: string
        trackCondition:
          type: string
        surfaceType:
          type: string
        totalprizepool:
          type: integer
          format: int64
        distance:
          type: string
        location:
          type: string
        capacity:
          type: integer
          format: int64
        bannerImageurl:
          type: string
        status:
          type: string
          enum:
          - OPEN_REGISTRATION
          - CLOSED_REGISTRATION
          - ONGOING
          - FINISHED
        refereeId:
          type: integer
          format: int64
        registrationDeadline:
          type: string
          format: date-time
      required:
      - raceName
    ApiResponseRaceHorseResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/RaceHorseResponse"
    RaceHorseResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        raceId:
          type: integer
          format: int64
        raceName:
          type: string
        horseId:
          type: integer
          format: int64
        horseName:
          type: string
        jockeyId:
          type: integer
          format: int64
        jockeyName:
          type: string
        laneNumber:
          type: integer
          format: int64
        startPosition:
          type: integer
          format: int64
        status:
          type: string
        registerAt:
          type: string
          format: date-time
        totalBetAmount:
          type: number
        totalBetCount:
          type: integer
          format: int64
        odds:
          type: number
    ApiResponseSignHorseResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/SignHorseResponse"
    SignHorseResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        horseName:
          type: string
        breed:
          type: string
        age:
          type: integer
          format: int32
        gender:
          type: string
        speedRating:
          type: integer
          format: int32
        historyRank:
          type: string
        avatarUrl:
          type: string
        weight:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - RETIRE
        trainerName:
          type: string
        trainerId:
          type: integer
          format: int64
        ownerId:
          type: integer
          format: int64
        ownerName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateUserStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - BANNED
      required:
      - status
    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data: {}
    UpdateUserRoleRequest:
      type: object
      properties:
        roleName:
          type: string
          enum:
          - ADMIN
          - STAFF
          - SPECTATOR
          - USER
          - HORSE_OWNER
          - JOCKEY
          - REFEREE
          - MANAGER
          - TRAINER
      required:
      - roleName
    DepositRequest:
      type: object
      properties:
        amount:
          type: integer
          format: int64
        paymentMethod:
          type: string
      required:
      - amount
    ApiResponseDepositResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/DepositResponse"
    DepositResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
        referenceCode:
          type: string
        qrUrl:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    RaceResultItemRequest:
