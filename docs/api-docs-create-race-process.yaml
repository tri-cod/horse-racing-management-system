        phoneNumber:
          type: string
        avatar:
          type: string
        status:
          type: string
        balance:
          type: number
    RegisterRequest:
      type: object
      properties:
        role:
          type: string
          enum:
          - ADMIN
          - STAFF
          - SPECTATOR
          - USER
          - HORSE_OWNER
          - JOCKEY
          - REFEREE
          - MANAGER
          - TRAINER
