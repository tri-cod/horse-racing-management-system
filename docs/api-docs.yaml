openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Authentication
  description: Authentication management APIs
paths:
  /api/auth/register:
    post:
      tags:
      - Authentication
      summary: Register a new user account
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseAuthMeResponse"
  /api/auth/login:
    post:
      tags:
      - Authentication
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseLoginResponse"
components:
  schemas:
    RegisterRequest:
      type: object
      properties:
        role:
          type: string
          enum:
          - ADMIN
          - STAFF
          - USER
          - HORSE_OWNER
          - JOCKEY
          - REFEREE
        fullName:
          type: string
          minLength: 1
        username:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        password:
          type: string
          maxLength: 2147483647
          minLength: 8
        phone:
          type: string
          pattern: "^[0-9]{10,11}$"
      required:
      - email
      - fullName
      - password
      - username
    ApiResponseAuthMeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/AuthMeResponse"
    AuthMeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        password:
          type: string
        role:
          type: string
        email:
          type: string
        fullName:
          type: string
        phoneNumber:
          type: string
        avatar:
          type: string
        status:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - password
      - username
    ApiResponseLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/LoginResponse"
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
        user:
          $ref: "#/components/schemas/AuthMeResponse"
